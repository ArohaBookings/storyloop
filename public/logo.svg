<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a87851"/>
      <stop offset="100%" stop-color="#6f4930"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="44" fill="#fbf8f2"/>
  <rect x="1" y="1" width="198" height="198" rx="43" fill="none" stroke="#e4d5c5" stroke-width="2"/>
  <!-- Infinite loop with a story line -->
  <path d="M 60 100 Q 60 60, 100 60 Q 140 60, 140 100 Q 140 140, 100 140 Q 60 140, 60 100 Z"
        stroke="url(#loopGrad)" stroke-width="9" fill="none" stroke-linecap="round" filter="url(#softGlow)" opacity="0.95"/>
  <!-- Smaller inner loop creating the 'loop' of story -->
  <path d="M 100 80 Q 120 80, 120 100 Q 120 120, 100 120 Q 80 120, 80 100 Q 80 80, 100 80 Z"
        stroke="#e8c155" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Center dot representing moment captured -->
  <circle cx="100" cy="100" r="5" fill="#a87851"/>
</svg>
